name: arista-lab

topology:
  nodes:
    spine1:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.10
    spine2:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.20
    leaf1:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.30
    leaf2:
      kind: arista_ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 172.20.20.40

    client1:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 10.0.1.2/24 dev eth1
        - ip route del default
        - ip route add default via 10.0.1.1 dev eth1
    client2:
      kind: linux
      image: alpine:latest
      exec:
        - ip link set eth1 up
        - ip addr add 10.0.2.2/24 dev eth1
        - ip route del default
        - ip route add default via 10.0.2.1 dev eth1

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    - endpoints: ["spine2:eth2", "leaf2:eth2"]
    - endpoints: ["leaf1:eth3", "client1:eth1"]
    - endpoints: ["leaf2:eth3", "client2:eth1"]